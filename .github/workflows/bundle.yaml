name: Bundle

on:
  release:
    types:
      - published

jobs:
  bundle:
    name: Bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # Keep the saved store under GitHub's 10 GB/repo cache budget.
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Build Roc from the flake
        run: nix build .#roc

      - name: Bundle the library
        working-directory: package
        run: |
          mkdir -p ../dist
          "$GITHUB_WORKSPACE/result/bin/roc" bundle --output-dir ../dist main.roc

      - name: Attach the bundle to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.tar.zst

      # Freeze this version's docs as a release asset. deploy-docs.yml collects
      # every release's docs.tar.gz to build the versioned docs site, so a
      # version's docs live on its release, not in the repo.
      - name: Generate docs
        env:
          ROC_DOCS_URL_ROOT: /${{ github.event.repository.name }}/${{ github.event.release.tag_name }}
        run: ./result/bin/roc docs package/main.roc

      - name: Package docs
        run: tar -czf docs.tar.gz -C generated-docs .

      - name: Attach the docs to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" docs.tar.gz
